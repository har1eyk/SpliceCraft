name: Bug report
description: SpliceCraft did something it shouldn't have.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file this. Before you start:

        - **For security-sensitive bugs** (path traversal, code
          execution, decompression bombs, anything that touches
          untrusted input), email `scocioba@gmail.com` with
          `[splicecraft-security]` in the subject — see
          [`SECURITY.md`](https://github.com/Binomica-Labs/SpliceCraft/blob/master/SECURITY.md).
          Do **not** file a public issue.
        - For everything else, fill in as much of this form as you
          can. The more detail, the faster the fix.

  - type: input
    id: version
    attributes:
      label: SpliceCraft version
      description: Output of `splicecraft --version`.
      placeholder: "0.9.2"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python3 --version`.
      placeholder: "Python 3.12.7"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux (specify distro below)
        - Windows (native)
        - WSL2
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: os-detail
    attributes:
      label: OS detail
      description: Distro + version (e.g. "Ubuntu 24.04 LTS"), or "WSL2 + Ubuntu 22.04", or "macOS 14.5".
    validations:
      required: false

  - type: input
    id: terminal
    attributes:
      label: Terminal emulator
      description: "Important — terminal-specific keybinding interception is a common bug class. (e.g. iTerm2, Windows Terminal, GNOME Terminal, Alacritty, kitty, Konsole.)"
      placeholder: "iTerm2 3.5.10"
    validations:
      required: true

  - type: input
    id: install-method
    attributes:
      label: Install method
      description: How did you install SpliceCraft?
      placeholder: "pipx install splicecraft / pip install / uv tool install / conda / dev checkout"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Minimal repro. If the bug needs a specific input file, attach
        it (drag-and-drop into this textarea works) or describe how
        to obtain it (e.g. "splicecraft L09137"). Real lab plasmids
        you can't share are fine — describe the topology / length /
        feature set.
      placeholder: |
        1. `splicecraft L09137`
        2. Press `r` to toggle RE sites
        3. Click on the BamHI cut site
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the exact error / traceback if there is one. Don't paste sequence content.
    validations:
      required: true

  - type: textarea
    id: ui-snapshot
    attributes:
      label: UI snapshot (`Alt+D`)
      description: |
        If the bug is reproducible in the running UI, press `Alt+D` to
        write a snapshot to `<DATA_DIR>/ui_snapshots/`, then paste the
        contents here. Sequence content is automatically scrubbed.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: log-bundle
    attributes:
      label: Log bundle (`splicecraft logs --bundle`)
      description: |
        For non-trivial bugs, attach a log bundle:
        `splicecraft logs --bundle --out ~/splicecraft-bug.zip`
        — it includes scrubbed paths and the last 5 UI snapshots. No
        sequence content is ever included.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Workarounds you've tried, related issues, hunches.
    validations:
      required: false
