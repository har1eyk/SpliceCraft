name: Tests

# Runs lint / type-check / pytest / coverage on every push to master
# and on every PR so regressions are caught before they ship to PyPI
# via publish.yml. Matrix covers the Python versions declared in
# pyproject.toml (requires-python = ">=3.10").

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an in-flight run on the same ref so a rapid push doesn't
# queue duplicate hour-long matrices behind itself.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: pyright
        # `[tool.pyright]` in pyproject.toml restricts the analysis to
        # splicecraft.py + splicecraft_biology.py + splicecraft_cli.py
        # (tests are excluded — see the comment in that block for why).
        #
        # PYRIGHT_PYTHON_FORCE_VERSION=latest pins to the upstream
        # latest pyright release on every CI run. The pyright Python
        # package is a launcher that downloads the actual binary on
        # first use; with `latest`, it re-resolves to the current
        # release every CI run instead of caching whatever was current
        # when the launcher was installed. Catches new type rules
        # immediately (which is what we want — we'd rather find an
        # issue against a new pyright in CI than against the user's
        # IDE pyright a release later).
        env:
          PYRIGHT_PYTHON_FORCE_VERSION: latest
        run: pyright

  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest -q --tb=short
        env:
          # Headless terminal so Textual's pilot doesn't try to detect a TTY.
          TERM: dumb

  coverage:
    name: Coverage (Python 3.12)
    runs-on: ubuntu-latest
    # Coverage is informational; let the matrix tests gate merges
    # independently of upload outcomes. Codecov is sometimes flaky.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run coverage
        # Single-process — coverage's combine step is fiddly under
        # pytest-xdist and the 5-min single-process run is acceptable
        # for the informational coverage job.
        run: |
          coverage run -m pytest -q --tb=short
          coverage report --skip-covered --skip-empty | tail -40
          coverage xml -o coverage.xml
        env:
          TERM: dumb
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: pytest
          fail_ci_if_error: false
          # Token-less upload works for public repos; if Codecov
          # later requires it, set `CODECOV_TOKEN` in repo secrets
          # and reference here.
