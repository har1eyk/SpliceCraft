name: Tests

# Sweep #18 (2026-05-21): trimmed for faster iteration cycles.
# Pre-sweep config ran a 4-Python matrix (3.10/3.11/3.12/3.13) +
# a separate coverage job — ~28 min wall-clock per push, dominated
# by serial pytest. The new shape runs lint + a SINGLE-Python-3.12
# pytest with `-n auto` xdist parallelism on 2-core GitHub runners.
# Expected wall-clock: ~6-8 min.
#
# Trade-off: we no longer matrix-test 3.10/3.11/3.13 on every push.
# `pyproject.toml` declares ``requires-python = ">=3.10"`` so those
# versions are still supported; ``release.py`` runs the full local
# suite before tagging, and any version-specific breakage is caught
# by the user's local pixi/uv environments before publish.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an in-flight run on the same ref so a rapid push doesn't
# queue duplicate runs behind itself.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff check
        # release.py also runs this BEFORE pytest (sweep #16); the CI
        # gate is the public confirmation rather than the only place
        # lint runs.
        run: ruff check .
      - name: pyright
        # `[tool.pyright]` in pyproject.toml restricts the analysis to
        # splicecraft.py + splicecraft_biology.py + splicecraft_cli.py
        # (tests are excluded — see the comment in that block for why).
        #
        # PYRIGHT_PYTHON_FORCE_VERSION=latest pins to the upstream
        # latest pyright release on every CI run. The pyright Python
        # package is a launcher that downloads the actual binary on
        # first use; with `latest`, it re-resolves to the current
        # release every CI run instead of caching whatever was current
        # when the launcher was installed. Catches new type rules
        # immediately (which is what we want — we'd rather find an
        # issue against a new pyright in CI than against the user's
        # IDE pyright a release later).
        env:
          PYRIGHT_PYTHON_FORCE_VERSION: latest
        run: pyright

  test:
    # Single Python (3.12, the version `release.py` runs locally) +
    # `-n auto` for xdist parallelism on the 2-core GitHub runner.
    # GitHub's `ubuntu-latest` ships 2 vCPUs, so xdist cuts the
    # ~16-min serial pytest down to ~7-8 min wall-clock.
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        # `-n auto` lets pytest-xdist parallelise across all available
        # CPUs. Tests are isolated by the autouse `_protect_user_data`
        # fixture in tests/conftest.py so cross-worker collisions are
        # impossible.
        run: python -m pytest -n auto -q --tb=short
        env:
          # Headless terminal so Textual's pilot doesn't try to detect
          # a TTY.
          TERM: dumb
